name: Build on push

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - main

jobs:
  build-on-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Use Node.js 24.x
        uses: actions/setup-node@v1
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install

      - name: Format
        run: yarn format

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Jest native guard
        run: yarn test-jest-native-guard

      - name: Coverage (Ava + Jest + Combined)
        run: yarn coverage-all

      - name: Upload combined coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: |
            coverage/combined-summary.json
            coverage/combined-summary.md
            coverage/history.jsonl

      - name: Bundle
        run: yarn bundle
