name: Build on push

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - main

jobs:
  build-on-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install

      - name: Format
        run: yarn format

      - name: Lint
        run: yarn lint

      - name: Test (Ava + Jest)
        run: yarn test-all

      - name: Bundle
        run: yarn bundle

  coverage-report:
    runs-on: ubuntu-latest
    needs: build-on-push
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install

      - name: Coverage (Ava + Jest + Combined)
        run: yarn coverage-all

      - name: Upload combined coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          if-no-files-found: ignore
          path: |
            coverage/combined-summary.json
            coverage/combined-summary.md
            coverage/history.jsonl
